<!DOCTYPE html>
<html>
<head>
  <title>Register - Digital Life Organizer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navArea"></div>

  <div class="container page-wrap fade-in">
    <div class="hero mb-4">
      <div class="hero-split">
        <div class="hero-copy">
          <h3 class="mb-1 fw-bold">Create your account</h3>
          <p class="lead">Start with a clean workspace, starter tasks, and a dashboard built for live presentation.</p>
          <div class="feature-row">
            <span class="feature-chip"><span class="dot"></span>Auto starter tasks</span>
            <span class="feature-chip"><span class="dot"></span>Newcomer workflow</span>
            <span class="feature-chip"><span class="dot"></span>Immediate role routing</span>
          </div>
        </div>
        <div class="hero-panel">
          <div class="small-muted mb-1">Demo ready</div>
          <strong>One account, full project flow</strong>
          <div class="small-muted mt-1">Register once and see the full app.</div>
        </div>
      </div>
    </div>

    <div class="card p-4 mx-auto shadow-soft" style="max-width: 560px;">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label" for="full_name">Full Name</label>
          <input id="full_name" class="form-control" placeholder="Avinash" aria-describedby="full_nameFeedback">
          <div id="full_nameFeedback" class="invalid-feedback"></div>
        </div>

        <div class="col-12">
          <label class="form-label" for="email">Email</label>
          <input id="email" class="form-control" placeholder="avinash@test.com" aria-describedby="emailFeedback">
          <div id="emailFeedback" class="invalid-feedback"></div>
        </div>

        <div class="col-12">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Minimum 6 characters" aria-describedby="passwordFeedback">
          <div id="passwordFeedback" class="invalid-feedback"></div>
        </div>

        <div class="col-12">
          <button id="registerBtn" class="btn btn-dark w-100" onclick="register()">Create Account</button>
          <div class="text-center mt-3">
            <span class="small-muted">Already have an account?</span> <a href="index.html">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    renderNavbar();

    function setFieldError(el, message) {
      if (!el) return;
      el.classList.add("is-invalid");
      const feedback = document.getElementById(el.id + "Feedback");
      if (feedback) feedback.textContent = message;
    }

    function clearFieldError(el) {
      if (!el) return;
      el.classList.remove("is-invalid");
      const feedback = document.getElementById(el.id + "Feedback");
      if (feedback) feedback.textContent = "";
    }

    function validateEmail(value) {
      return /^\S+@\S+\.\S+$/.test(value);
    }

    async function register() {
      const fullNameEl = document.getElementById("full_name");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const btn = document.getElementById("registerBtn");

      clearFieldError(fullNameEl);
      clearFieldError(emailEl);
      clearFieldError(passwordEl);

      const full_name = fullNameEl.value.trim();
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!full_name) {
        setFieldError(fullNameEl, "Full name is required");
        fullNameEl.focus();
        return;
      }

      if (full_name.length < 2) {
        setFieldError(fullNameEl, "Full name must be at least 2 characters");
        fullNameEl.focus();
        return;
      }

      if (!email) {
        setFieldError(emailEl, "Email is required");
        emailEl.focus();
        return;
      }

      if (!validateEmail(email)) {
        setFieldError(emailEl, "Enter a valid email address");
        emailEl.focus();
        return;
      }

      if (!password) {
        setFieldError(passwordEl, "Password is required");
        passwordEl.focus();
        return;
      }

      if (password.length < 6) {
        setFieldError(passwordEl, "Password must be at least 6 characters");
        passwordEl.focus();
        return;
      }

      btn.disabled = true;
      try {
        const data = await apiRequest("/auth/register", "POST", { full_name, email, password }, false);

        if (data.token) {
          saveAuth(data.token, data.user);
          toast("Account created ✅", "success");
          redirectByRole(data.user);
        } else {
          toast(data.message || "Register failed", "error");
        }
      } catch (e) {
        toast(e.message, "error");
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
