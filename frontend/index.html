<!DOCTYPE html>
<html>
<head>
  <title>Login - Digital Life Organizer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navArea"></div>

  <div class="container page-wrap fade-in">
    <div class="hero mb-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
          <h3 class="mb-1 fw-bold">Welcome back 👋</h3>
          <div class="small-muted">Login to manage tasks, deadlines, and announcements.</div>
        </div>
        <span class="kpi-pill">Secure JWT Login</span>
      </div>
    </div>

    <div class="card p-4 mx-auto shadow-soft" style="max-width: 460px;">
      <div class="text-center mb-3">
        <div class="d-inline-flex align-items-center gap-2 mb-2">
          <span class="brand-dot"></span>
          <span class="fw-bold">Digital Life Organizer</span>
        </div>
        <div class="small-muted">Sign in to continue</div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-control" placeholder="name@example.com" aria-describedby="emailFeedback">
        <div id="emailFeedback" class="invalid-feedback"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Enter your password" aria-describedby="passwordFeedback">
        <div id="passwordFeedback" class="invalid-feedback"></div>
      </div>

      <button id="loginBtn" class="btn btn-dark w-100" onclick="login()">Login</button>

      <div class="text-center mt-3">
        <span class="small-muted">No account?</span> <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    renderNavbar();

    const token = localStorage.getItem("token");
    const u = getUser();
    if (token && u) redirectByRole(u);

    function setFieldError(el, message) {
      if (!el) return;
      el.classList.add("is-invalid");
      const feedback = document.getElementById(el.id + "Feedback");
      if (feedback) feedback.textContent = message;
    }

    function clearFieldError(el) {
      if (!el) return;
      el.classList.remove("is-invalid");
      const feedback = document.getElementById(el.id + "Feedback");
      if (feedback) feedback.textContent = "";
    }

    function validateEmail(value) {
      return /^\S+@\S+\.\S+$/.test(value);
    }

    async function login() {
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const btn = document.getElementById("loginBtn");

      clearFieldError(emailEl);
      clearFieldError(passwordEl);

      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email) {
        setFieldError(emailEl, "Email is required");
        emailEl.focus();
        return;
      }

      if (!validateEmail(email)) {
        setFieldError(emailEl, "Enter a valid email address");
        emailEl.focus();
        return;
      }

      if (!password) {
        setFieldError(passwordEl, "Password is required");
        passwordEl.focus();
        return;
      }

      btn.disabled = true;
      try {
        const data = await apiRequest("/auth/login", "POST", { email, password }, false);
        if (data.token) {
          saveAuth(data.token, data.user);
          toast("Login successful ✅", "success");
          redirectByRole(data.user);
        } else {
          toast(data.message || "Login failed", "error");
        }
      } catch (e) {
        toast(e.message, "error");
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
